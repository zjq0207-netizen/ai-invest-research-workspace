services:
  - type: web
    name: ai-invest-research-workspace
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NEXT_PUBLIC_ENABLE_REALTIME_PRICES
        value: "false"
